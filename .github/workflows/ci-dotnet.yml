name: ci-dotnet

# Reusable .NET CI.
# Consume via: uses: itotallyforgot/.github/.github/workflows/ci-dotnet.yml@v1
#
# Frozen aggregate check (required-status-check API surface): dotnet-ci-passed
# Do NOT rename dotnet-ci-passed — rulesets reference it by name.

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: .NET SDK version to install.
        type: string
        default: "8.0.x"
      working-directory:
        description: Directory containing the solution or project.
        type: string
        default: "."

permissions: {}

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      - name: Restore (locked mode)
        run: dotnet restore --locked-mode
      - name: Build (warnings as errors)
        run: dotnet build --no-restore -warnaserror
      - name: Test
        run: dotnet test --no-build

  vuln-scan:
    name: vuln-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      - name: Restore (locked mode)
        run: dotnet restore --locked-mode
      - name: List vulnerable packages (fail if any)
        shell: bash
        run: |
          set -euo pipefail
          # `dotnet list package --vulnerable` exits 0 even when vulnerabilities
          # exist, so detect the per-project marker line it prints instead.
          out="$(dotnet list package --vulnerable --include-transitive 2>&1)"
          echo "$out"
          if echo "$out" | grep -qi 'has the following vulnerable packages'; then
            echo "::error::vulnerable NuGet packages detected"
            exit 1
          fi
          echo "no vulnerable packages reported"

  # FROZEN AGGREGATE CHECK — required status check. Never rename.
  dotnet-ci-passed:
    name: dotnet-ci-passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - build-and-test
      - vuln-scan
    steps:
      - name: Assert all required .NET CI jobs succeeded
        env:
          R_BUILD: ${{ needs.build-and-test.result }}
          R_VULN: ${{ needs.vuln-scan.result }}
        run: |
          set -euo pipefail
          fail=0
          for pair in "build-and-test:$R_BUILD" "vuln-scan:$R_VULN"; do
            name="${pair%%:*}"; res="${pair#*:}"
            if [ "$res" != "success" ]; then
              echo "::error::required job '$name' result=$res (expected success)"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "ci-dotnet: FAILED"
            exit 1
          fi
          echo "ci-dotnet: all required jobs passed"

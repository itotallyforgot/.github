name: ci-python-uv

# Reusable Python CI (uv-managed).
# Consume via: uses: itotallyforgot/.github/.github/workflows/ci-python-uv.yml@v1
#
# Frozen aggregate check (required-status-check API surface): ci-passed
# Do NOT rename ci-passed — rulesets reference it by name.

on:
  workflow_call:
    inputs:
      cov-floor:
        description: Minimum total coverage percent; pytest fails below it.
        type: number
        default: 0
      python-versions:
        description: JSON array of Python versions for the test matrix.
        type: string
        default: '["3.12"]'
      enable-bandit:
        description: Run the Bandit SAST job and upload SARIF.
        type: boolean
        default: false
      working-directory:
        description: Directory to run all steps in.
        type: string
        default: "."

permissions: {}

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - name: Sync dependencies
        run: uv sync --frozen || uv sync --all-extras --dev
      - name: Ruff check
        run: uv run ruff check --output-format=github .
      - name: Ruff format (check only)
        run: uv run ruff format --check .

  typecheck:
    name: typecheck (pyright)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - name: Sync dependencies
        run: uv sync --frozen || uv sync --all-extras --dev
      - name: Pyright
        run: uv run pyright

  test:
    name: test (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --frozen || uv sync --all-extras --dev
      - name: Pytest (with coverage floor)
        run: uv run pytest --cov --cov-fail-under=${{ inputs.cov-floor }}

  bandit:
    name: bandit (SAST)
    runs-on: ubuntu-latest
    if: ${{ inputs.enable-bandit }}
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Detect Python sources
        id: detect
        shell: bash
        run: |
          if find . -name '*.py' -print -quit | grep -q .; then
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up uv
        if: steps.detect.outputs.has_py == 'true'
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - name: Run Bandit (SARIF)
        if: steps.detect.outputs.has_py == 'true'
        run: |
          uvx bandit --recursive --format sarif --output bandit.sarif . || true
      - name: Upload Bandit SARIF
        if: steps.detect.outputs.has_py == 'true'
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: ${{ inputs.working-directory }}/bandit.sarif
          category: bandit

  # FROZEN AGGREGATE CHECK — required status check. Never rename.
  ci-passed:
    name: ci-passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - typecheck
      - test
      - bandit
    steps:
      - name: Assert all required CI jobs succeeded
        env:
          R_LINT: ${{ needs.lint.result }}
          R_TYPECHECK: ${{ needs.typecheck.result }}
          R_TEST: ${{ needs.test.result }}
          R_BANDIT: ${{ needs.bandit.result }}
          BANDIT_ENABLED: ${{ inputs.enable-bandit }}
        run: |
          set -euo pipefail
          fail=0
          for pair in "lint:$R_LINT" "typecheck:$R_TYPECHECK" "test:$R_TEST"; do
            name="${pair%%:*}"; res="${pair#*:}"
            if [ "$res" != "success" ]; then
              echo "::error::required job '$name' result=$res (expected success)"
              fail=1
            fi
          done
          if [ "$BANDIT_ENABLED" = "true" ]; then
            if [ "$R_BANDIT" != "success" ]; then
              echo "::error::bandit result=$R_BANDIT (expected success)"
              fail=1
            fi
          else
            if [ "$R_BANDIT" != "skipped" ] && [ "$R_BANDIT" != "success" ]; then
              echo "::error::bandit result=$R_BANDIT (expected skipped/success)"
              fail=1
            fi
          fi
          if [ "$fail" -ne 0 ]; then
            echo "ci-python-uv: FAILED"
            exit 1
          fi
          echo "ci-python-uv: all required jobs passed"

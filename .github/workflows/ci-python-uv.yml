name: ci-python-uv

# Reusable Python CI (uv-managed).
# Consume via: uses: itotallyforgot/.github/.github/workflows/ci-python-uv.yml@v1
#
# Frozen aggregate check (required-status-check API surface): ci-passed
# Do NOT rename ci-passed — rulesets reference it by name.

on:
  workflow_call:
    inputs:
      cov-floor:
        description: Minimum total coverage percent; pytest fails below it.
        type: number
        default: 0
      python-versions:
        description: JSON array of Python versions for the test matrix.
        type: string
        default: '["3.12"]'
      enable-bandit:
        description: Run the Bandit SAST job and upload SARIF.
        type: boolean
        default: false
      working-directory:
        description: Directory to run all steps in.
        type: string
        default: "."

permissions: {}

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      # ruff is a standalone linter (no project import needed) — the paved path
      # provides it via uvx so consumers don't have to declare it themselves.
      - name: Ruff check
        run: uvx ruff check --output-format=github .
      - name: Ruff format (check only)
        run: uvx ruff format --check .

  typecheck:
    name: typecheck (pyright)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      # --frozen alone installs only default deps; --all-extras --dev pulls the
      # test/tooling deps whether the repo declares them as extras or a dev group.
      - name: Sync dependencies
        run: uv sync --frozen --all-extras --dev || uv sync --all-extras --dev
      # pyright needs the synced project env to resolve imports; the paved path
      # provides pyright itself via --with so consumers need not declare it.
      - name: Pyright
        run: uv run --with pyright pyright

  test:
    name: test (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --frozen --all-extras --dev || uv sync --all-extras --dev
      # pytest + the repo's own plugins come from the synced env; the paved path
      # supplies pytest-cov so the coverage gate works even if unlisted.
      - name: Pytest (with coverage floor)
        run: uv run --with pytest-cov pytest --cov --cov-fail-under=${{ inputs.cov-floor }}

  bandit:
    name: bandit (SAST)
    runs-on: ubuntu-latest
    if: ${{ inputs.enable-bandit }}
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Detect Python sources
        id: detect
        shell: bash
        run: |
          if find . -name '*.py' -print -quit | grep -q .; then
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up uv
        if: steps.detect.outputs.has_py == 'true'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Run Bandit (SARIF)
        if: steps.detect.outputs.has_py == 'true'
        run: |
          uvx bandit --recursive --format sarif --output bandit.sarif . || true
      - name: Upload Bandit SARIF
        if: steps.detect.outputs.has_py == 'true'
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: ${{ inputs.working-directory }}/bandit.sarif
          category: bandit

  # FROZEN AGGREGATE CHECK — required status check. Never rename.
  ci-passed:
    name: ci-passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - typecheck
      - test
      - bandit
    steps:
      - name: Assert all required CI jobs succeeded
        env:
          R_LINT: ${{ needs.lint.result }}
          R_TYPECHECK: ${{ needs.typecheck.result }}
          R_TEST: ${{ needs.test.result }}
          R_BANDIT: ${{ needs.bandit.result }}
          BANDIT_ENABLED: ${{ inputs.enable-bandit }}
        run: |
          set -euo pipefail
          fail=0
          for pair in "lint:$R_LINT" "typecheck:$R_TYPECHECK" "test:$R_TEST"; do
            name="${pair%%:*}"; res="${pair#*:}"
            if [ "$res" != "success" ]; then
              echo "::error::required job '$name' result=$res (expected success)"
              fail=1
            fi
          done
          if [ "$BANDIT_ENABLED" = "true" ]; then
            if [ "$R_BANDIT" != "success" ]; then
              echo "::error::bandit result=$R_BANDIT (expected success)"
              fail=1
            fi
          else
            if [ "$R_BANDIT" != "skipped" ] && [ "$R_BANDIT" != "success" ]; then
              echo "::error::bandit result=$R_BANDIT (expected skipped/success)"
              fail=1
            fi
          fi
          if [ "$fail" -ne 0 ]; then
            echo "ci-python-uv: FAILED"
            exit 1
          fi
          echo "ci-python-uv: all required jobs passed"

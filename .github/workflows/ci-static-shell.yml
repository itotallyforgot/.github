name: ci-static-shell

# Reusable static checks for shell / docs / mixed-tooling repos.
# Consume via: uses: itotallyforgot/.github/.github/workflows/ci-static-shell.yml@v1
#
# Frozen aggregate check (required-status-check API surface): static-ci-passed
# Do NOT rename static-ci-passed — rulesets reference it by name.

on:
  workflow_call:
    inputs:
      run-python-tests:
        description: Run pytest and a path-gated Bandit scan for repos that ship Python.
        type: boolean
        default: false

permissions: {}

jobs:
  shell:
    name: shell (shellcheck + shfmt)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: shellcheck
        run: |
          set -euo pipefail
          mapfile -t files < <(grep -rIl --include='*.sh' '' . || true)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no shell scripts found"
            exit 0
          fi
          shellcheck "${files[@]}"
      - name: shfmt (diff check)
        run: |
          set -euo pipefail
          go install mvdan.cc/sh/v3/cmd/shfmt@latest
          "$(go env GOPATH)/bin/shfmt" --diff --simplify .

  markdownlint:
    name: markdownlint-cli2
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: markdownlint-cli2
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules"

  links:
    name: lychee (link check)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --no-progress --verbose './**/*.md'
          fail: true

  python-tests:
    name: python-tests
    runs-on: ubuntu-latest
    if: ${{ inputs.run-python-tests }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Sync dependencies
        run: uv sync --frozen || uv sync --all-extras --dev
      - name: Pytest
        run: uv run pytest

  bandit:
    name: bandit (SAST)
    runs-on: ubuntu-latest
    if: ${{ inputs.run-python-tests }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Detect Python sources
        id: detect
        shell: bash
        run: |
          if find . -name '*.py' -print -quit | grep -q .; then
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run Bandit (SARIF)
        if: steps.detect.outputs.has_py == 'true'
        run: uvx bandit --recursive --format sarif --output bandit.sarif . || true
      - name: Upload Bandit SARIF
        if: steps.detect.outputs.has_py == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: bandit.sarif
          category: bandit

  # FROZEN AGGREGATE CHECK — required status check. Never rename.
  static-ci-passed:
    name: static-ci-passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - shell
      - markdownlint
      - links
      - python-tests
      - bandit
    steps:
      - name: Assert all required static jobs succeeded
        env:
          R_SHELL: ${{ needs.shell.result }}
          R_MD: ${{ needs.markdownlint.result }}
          R_LINKS: ${{ needs.links.result }}
          R_PYTEST: ${{ needs.python-tests.result }}
          R_BANDIT: ${{ needs.bandit.result }}
          PY_ENABLED: ${{ inputs.run-python-tests }}
        run: |
          set -euo pipefail
          fail=0
          for pair in "shell:$R_SHELL" "markdownlint:$R_MD" "links:$R_LINKS"; do
            name="${pair%%:*}"; res="${pair#*:}"
            if [ "$res" != "success" ]; then
              echo "::error::required job '$name' result=$res (expected success)"
              fail=1
            fi
          done
          if [ "$PY_ENABLED" = "true" ]; then
            for pair in "python-tests:$R_PYTEST" "bandit:$R_BANDIT"; do
              name="${pair%%:*}"; res="${pair#*:}"
              if [ "$res" != "success" ]; then
                echo "::error::required job '$name' result=$res (expected success)"
                fail=1
              fi
            done
          else
            for pair in "python-tests:$R_PYTEST" "bandit:$R_BANDIT"; do
              name="${pair%%:*}"; res="${pair#*:}"
              if [ "$res" != "skipped" ] && [ "$res" != "success" ]; then
                echo "::error::$name result=$res (expected skipped/success)"
                fail=1
              fi
            done
          fi
          if [ "$fail" -ne 0 ]; then
            echo "ci-static-shell: FAILED"
            exit 1
          fi
          echo "ci-static-shell: all required jobs passed"

# Canonical Dependabot config for the fleet.
# Copy to .github/dependabot.yml in a consuming repo and uncomment the
# ecosystems that repo actually uses. github-actions is always on so the
# SHA-pinned action versions in reusable workflows stay current.
#
# Grouping: minor + patch bumps are batched into a single PR per ecosystem to
# cut review noise; major bumps still open their own PRs.

version: 2
updates:
  # Always on — keeps pinned action SHAs fresh across the fleet.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

